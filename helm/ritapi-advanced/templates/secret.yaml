apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ritapi-advanced.fullname" . }}
  labels:
    {{- include "ritapi-advanced.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "secrets.secretKey is required" .Values.secrets.secretKey | quote }}
  ADMIN_SECRET: {{ required "secrets.adminSecret is required" .Values.secrets.adminSecret | quote }}
  DASHBOARD_TOKEN: {{ .Values.secrets.dashboardToken | default "" | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  REDIS_URL: {{ include "ritapi-advanced.redisUrl" . | quote }}
