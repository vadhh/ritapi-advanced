# nginx.conf — RitAPI Advanced reverse proxy
#
# Proxies HTTPS → uvicorn on 127.0.0.1:8001.
# HTTP is redirected to HTTPS.
#
# TLS setup (self-signed for dev, replace with real certs for production):
#   openssl req -x509 -newkey rsa:4096 -keyout /etc/ssl/private/ritapi.key \
#     -out /etc/ssl/certs/ritapi.crt -days 365 -nodes \
#     -subj "/CN=ritapi"
#
# Deploy:
#   sudo cp nginx.conf /etc/nginx/sites-available/ritapi
#   sudo ln -sf /etc/nginx/sites-available/ritapi /etc/nginx/sites-enabled/ritapi
#   sudo nginx -t && sudo systemctl reload nginx

worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
}

http {
    # --- Logging ---
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time"}';

    access_log /var/log/nginx/ritapi_access.log json_combined;
    error_log  /var/log/nginx/ritapi_error.log warn;

    # --- Connection limits ---
    limit_req_zone $binary_remote_addr zone=ritapi_zone:10m rate=100r/s;

    # --- Upstream ---
    upstream ritapi_backend {
        server 127.0.0.1:8001;
        keepalive 32;
    }

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS server ---
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS — generate certificates before starting Nginx:
        #   Dev (self-signed):  sudo ./scripts/gen_cert.sh
        #   Prod (Let's Encrypt): sudo ./scripts/gen_cert.sh your.domain.com
        #
        # Self-signed / custom CA paths:
        ssl_certificate     /etc/ssl/certs/ritapi.crt;
        ssl_certificate_key /etc/ssl/private/ritapi.key;
        #
        # Let's Encrypt (Certbot) paths — uncomment and replace domain:
        # ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (enable once TLS is stable)
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # --- Security headers ---
        add_header X-Content-Type-Options  nosniff always;
        add_header X-Frame-Options         DENY    always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "no-referrer" always;

        # --- Request limits ---
        limit_req zone=ritapi_zone burst=200 nodelay;
        client_max_body_size 4m;    # 2× the app's 2 MB cap; app enforces final limit

        # --- Proxy ---
        location / {
            proxy_pass         http://ritapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer settings
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;
        }

        # Metrics endpoint — restrict to localhost / monitoring subnet only.
        # Comment out or adjust the allow/deny rules for your environment.
        location /metrics {
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://ritapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check — always open (used by load balancers)
        location /healthz {
            proxy_pass http://ritapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }
    }
}
