# .github/workflows/ci.yml — RitAPI Advanced CI/CD pipeline
#
# Stages: lint → test → build image → sign image → push to registry
#
# Required repository secrets:
#   REGISTRY_USER      — container registry username (e.g. GitHub username)
#   REGISTRY_TOKEN     — container registry PAT / password
#   COSIGN_PRIVATE_KEY — cosign private key (base64), generated with:
#                          cosign generate-key-pair
#   COSIGN_PASSWORD    — passphrase for the cosign key
#
# Optional:
#   REGISTRY           — defaults to ghcr.io
#   IMAGE_NAME         — defaults to <owner>/<repo>

name: CI

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write        # push to GHCR
  id-token: write        # cosign keyless signing (OIDC)

env:
  REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME || github.repository }}

jobs:

  # ---------------------------------------------------------------------------
  # 1. Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: pip install ruff bandit

      - name: ruff — style / import order
        run: ruff check app/ tests/

      - name: bandit — security linter
        run: bandit -r app/ -ll --exit-zero

  # ---------------------------------------------------------------------------
  # 2. Test
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install YARA system library
        run: sudo apt-get update && sudo apt-get install -y libyara-dev

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: "60"
          ADMIN_SECRET: ci-admin-secret
          YARA_RULES_DIR: ${{ github.workspace }}/rules
          LOG_PATH: /tmp/ritapi_ci.jsonl
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Build & push container image
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    # Only push on main branch or version tags; PRs only build (no push)
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-ref: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ---------------------------------------------------------------------------
  # 4. Sign image with cosign
  # ---------------------------------------------------------------------------
  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: build
    # Only run on push to main or on version tags (not PRs)
    if: github.event_name != 'pull_request'

    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Sign image with cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ needs.build.outputs.image-digest }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "Signing: $IMAGE"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$IMAGE"

      - name: Verify signature
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
          DIGEST: ${{ needs.build.outputs.image-digest }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          cosign verify --key env://COSIGN_PUBLIC_KEY "$IMAGE"
