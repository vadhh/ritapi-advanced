# Policy: auth
# Applied to general authenticated API routes.

auth:
  jwt: true
  api_key: true

rate_limit:
  requests: 100
  window_seconds: 60

schema_enforcement:
  enabled: false

decision_actions:
  on_auth_failure: block
  on_rate_limit: throttle
  on_injection: block
  on_bot_detection: monitor
  on_exfiltration: monitor
