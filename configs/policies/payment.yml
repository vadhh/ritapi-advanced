# Policy: payment
# Strict enforcement for payment-related endpoints.

auth:
  jwt: true
  api_key: false

rate_limit:
  requests: 20
  window_seconds: 60

schema_enforcement:
  enabled: true
  schema: PaymentPayload

decision_actions:
  on_auth_failure: block
  on_rate_limit: block
  on_injection: block
  on_bot_detection: block
  on_exfiltration: block
