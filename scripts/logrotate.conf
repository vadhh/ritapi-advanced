# logrotate configuration for RitAPI Advanced
#
# Installation:
#   sudo cp scripts/logrotate.conf /etc/logrotate.d/ritapi-advanced
#   sudo logrotate --debug /etc/logrotate.d/ritapi-advanced   # dry-run
#   sudo logrotate -f /etc/logrotate.d/ritapi-advanced        # force rotate now
#
# Verify cron runs it: /etc/cron.daily/logrotate (runs via anacron)
#
# Adjust LOG_PATH to match the LOG_PATH env var in your .env file.
# Default: /var/log/ritapi/ritapi_advanced.jsonl

/var/log/ritapi/ritapi_advanced.jsonl {
    # Rotate daily
    daily

    # Keep 90 days of logs
    rotate 90

    # Compress rotated files with gzip
    compress

    # Delay compression by one cycle (so the current rotated file stays
    # readable for a day while in-flight writes finish)
    delaycompress

    # Do not error if the log file is missing (service may be stopped)
    missingok

    # Do not rotate if the log file is empty
    notifempty

    # Append date to rotated filename: ritapi_advanced.jsonl-20260307.gz
    dateext
    dateformat -%Y%m%d

    # Create a fresh log file after rotation, owned by the service user
    # Adjust user/group/mode to match your deployment
    create 0640 ritapi ritapi

    # Signal the running uvicorn process to reopen the log file.
    # For Docker deployments, use `docker compose restart app` instead
    # and remove this postrotate block.
    postrotate
        # Reload if systemd unit exists; silently skip otherwise
        systemctl reload-or-restart ritapi-advanced 2>/dev/null || true
    endscript
}

# If running multiple environments (staging, production) on the same host,
# add additional stanzas below:
#
# /var/log/ritapi/staging_ritapi_advanced.jsonl {
#     daily
#     rotate 30
#     compress
#     delaycompress
#     missingok
#     notifempty
#     dateext
#     dateformat -%Y%m%d
#     create 0640 ritapi ritapi
