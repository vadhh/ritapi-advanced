# docker/demo.yml — RitAPI Advanced live demo stack
#
# Starts the app + Redis with demo-safe credentials and low rate limits
# so every protection layer triggers visibly during the demo.
#
# Usage:
#   docker compose -f docker/demo.yml up --build
#   # In a second terminal:
#   ./scripts/demo_attack.sh

networks:
  demo:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1

services:
  redis:
    image: redis:7-alpine
    container_name: ritapi-demo-redis
    networks:
      - demo
    command: redis-server --save "" --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ritapi-demo-app
    env_file: ../.env.demo
    networks:
      - demo
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/healthz"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 10
