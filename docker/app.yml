# docker/app.yml — Full-stack staging deployment
#
# Services: app (FastAPI) + redis + nginx
# Requires: .env.staging (copy from .env.staging.example and fill secrets)
#
# Start:
#   docker compose -f docker/app.yml --env-file .env.staging up -d
#
# Stop:
#   docker compose -f docker/app.yml down
#
# View logs:
#   docker compose -f docker/app.yml logs -f app
#
# Run smoke tests after startup:
#   bash scripts/smoke_test.sh http://localhost

name: ritapi-staging

services:

  # ---------------------------------------------------------------------------
  # Redis (standalone — use redis-sentinel.yml for HA)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ritapi-staging-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ritapi-advanced:staging
    container_name: ritapi-staging-app
    restart: unless-stopped
    env_file: ../.env.staging
    environment:
      # Override REDIS_URL to use internal network hostname
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      ROUTING_CONFIG_PATH: /app/configs/routing.yml
      POLICIES_DIR: /app/configs/policies
    volumes:
      - app_logs:/var/log/ritapi
      - app_configs:/app/configs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    # Not exposed to host directly — nginx proxies all traffic
    expose:
      - "8001"

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: ritapi-staging-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/ssl/ritapi:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - internal
      - external

# ---------------------------------------------------------------------------
# Networks — internal keeps app/redis off the public network
# ---------------------------------------------------------------------------
networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  redis_data:
  app_logs:
  app_configs:
  nginx_certs:
  nginx_logs:
