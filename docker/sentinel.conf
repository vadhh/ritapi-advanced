# sentinel.conf — Redis Sentinel configuration
# Used by docker/redis-sentinel.yml

port 26379
daemonize no

# Monitor the primary. quorum = 2 (majority of 3 sentinels must agree).
sentinel monitor mymaster redis-primary 6379 2

# Mark primary as down after 5 seconds of no response
sentinel down-after-milliseconds mymaster 5000

# Failover timeout: if a failover is not completed in 60s, try again
sentinel failover-timeout mymaster 60000

# Only 1 replica syncs from new primary at a time during failover
sentinel parallel-syncs mymaster 1

# Notify on topology changes (optional — set to a script path or leave empty)
# sentinel notification-script mymaster /opt/ritapi/notify.sh
